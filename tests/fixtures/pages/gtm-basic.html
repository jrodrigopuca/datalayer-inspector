<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTM Basic Test Page</title>
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      'event': 'gtm.js',
      'gtm.start': Date.now()
    });
  </script>
  <!-- Simulated GTM container -->
  <script>
    window.google_tag_manager = window.google_tag_manager || {};
    window.google_tag_manager['GTM-TEST01'] = {
      dataLayer: { name: 'dataLayer' }
    };
  </script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      margin: 0.5rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover {
      background: #e5e5e5;
    }
    .actions {
      margin-top: 1rem;
    }
    #event-log {
      margin-top: 2rem;
      padding: 1rem;
      background: #f9f9f9;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry {
      padding: 0.25rem 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h1>GTM Basic Test Page</h1>
  <p>This page simulates a basic GTM setup with a single container.</p>
  
  <div class="actions">
    <h2>Test Actions</h2>
    <button id="page-view" onclick="pushPageView()">Push Page View</button>
    <button id="add-to-cart" onclick="pushAddToCart()">Add to Cart</button>
    <button id="purchase" onclick="pushPurchase()">Purchase</button>
    <button id="custom-event" onclick="pushCustomEvent()">Custom Event</button>
    <button id="user-data" onclick="pushUserData()">Push User Data (no event)</button>
  </div>

  <div id="event-log">
    <strong>Event Log:</strong>
    <div id="log-entries"></div>
  </div>

  <script>
    // Log events to page for debugging
    function logEvent(data) {
      const log = document.getElementById('log-entries');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = JSON.stringify(data);
      log.insertBefore(entry, log.firstChild);
    }

    // Wrap push to log
    const originalPush = Array.prototype.push;
    const _push = dataLayer.push.bind(dataLayer);
    dataLayer.push = function(...args) {
      args.forEach(arg => logEvent(arg));
      return _push(...args);
    };

    function pushPageView() {
      dataLayer.push({
        event: 'page_view',
        page_title: 'GTM Basic Test Page',
        page_location: window.location.href
      });
    }

    function pushAddToCart() {
      dataLayer.push({
        event: 'add_to_cart',
        ecommerce: {
          currency: 'USD',
          value: 29.99,
          items: [{
            item_id: 'SKU-123',
            item_name: 'Widget',
            price: 29.99,
            quantity: 1
          }]
        }
      });
    }

    function pushPurchase() {
      dataLayer.push({
        event: 'purchase',
        ecommerce: {
          transaction_id: 'T-' + Date.now(),
          currency: 'USD',
          value: 59.98,
          tax: 4.99,
          shipping: 5.99,
          items: [{
            item_id: 'SKU-123',
            item_name: 'Widget',
            price: 29.99,
            quantity: 2
          }]
        }
      });
    }

    function pushCustomEvent() {
      dataLayer.push({
        event: 'custom_interaction',
        category: 'engagement',
        action: 'click',
        label: 'hero_button'
      });
    }

    function pushUserData() {
      dataLayer.push({
        user_id: 'U-' + Math.random().toString(36).slice(2, 10),
        user_type: 'premium',
        user_segment: 'high_value'
      });
    }
  </script>
</body>
</html>
