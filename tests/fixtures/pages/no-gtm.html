<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No GTM Page</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      text-align: center;
    }
    .warning-box {
      padding: 2rem;
      background: #fef2f2;
      border: 2px solid #ef4444;
      border-radius: 8px;
      margin: 2rem 0;
    }
    .warning-icon {
      font-size: 4rem;
    }
    h1 {
      color: #ef4444;
    }
    .check-list {
      text-align: left;
      max-width: 400px;
      margin: 2rem auto;
    }
    .check-item {
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .check-item::before {
      content: '❌';
    }
    button {
      padding: 0.75rem 1.5rem;
      margin: 0.5rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    #status {
      margin-top: 1rem;
      padding: 1rem;
      background: #f9f9f9;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>No GTM Installed</h1>
  
  <div class="warning-box">
    <div class="warning-icon">⚠️</div>
    <p>This page has <strong>no dataLayer</strong> or <strong>GTM container</strong> installed.</p>
    <p>The extension should handle this gracefully without errors.</p>
  </div>

  <div class="check-list">
    <div class="check-item">No <code>window.dataLayer</code> array</div>
    <div class="check-item">No <code>window.google_tag_manager</code> object</div>
    <div class="check-item">No GTM scripts loaded</div>
  </div>

  <h2>Test Actions</h2>
  <button id="check-datalayer" onclick="checkDataLayer()">Check dataLayer</button>
  <button id="create-datalayer" onclick="createDataLayer()">Create dataLayer</button>

  <div id="status">Status: Checking...</div>

  <script>
    function updateStatus() {
      const status = document.getElementById('status');
      const hasDataLayer = typeof window.dataLayer !== 'undefined';
      const hasGTM = typeof window.google_tag_manager !== 'undefined';
      
      status.innerHTML = `
        <div>window.dataLayer: ${hasDataLayer ? '✅ exists' : '❌ undefined'}</div>
        <div>window.google_tag_manager: ${hasGTM ? '✅ exists' : '❌ undefined'}</div>
      `;
    }

    function checkDataLayer() {
      updateStatus();
      console.log('dataLayer:', window.dataLayer);
      console.log('google_tag_manager:', window.google_tag_manager);
    }

    function createDataLayer() {
      // Simulate late GTM installation
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: 'gtm.js', 'gtm.start': Date.now() });
      window.google_tag_manager = {
        'GTM-LATE': { dataLayer: { name: 'dataLayer' } }
      };
      updateStatus();
      alert('DataLayer created! The extension should detect this.');
    }

    // Initial status check
    updateStatus();
  </script>
</body>
</html>
