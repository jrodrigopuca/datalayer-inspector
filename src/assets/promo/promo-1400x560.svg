  <text x="965" y="358" font-family="monospace" font-size="10" fill="#7dd3fc">"event"</text>
  <text x="1015" y="358" font-family="monospace" font-size="10" fill="#64748b">:</text>
  <text x="1025" y="358" font-family="monospace" font-size="10" fill="#fcd34d">"purchase"</text>
  <text x="1090" y="358" font-family="monospace" font-size="10" fill="#64748b">,</text>
  <text x="965" y="374" font-family="monospace" font-size="10" fill="#7dd3fc">"ecommerce"</text>
  <text x="1045" y="374" font-family="monospace" font-size="10" fill="#64748b">: {</text>
  <text x="980" y="390" font-family="monospace" font-size="10" fill="#7dd3fc">"value"</text>
  <text x="1025" y="390" font-family="monospace" font-size="10" fill="#64748b">:</text>
  <text x="1035" y="390" font-family="monospace" font-size="10" fill="#4ade80">149.99</text>
  <text x="1080" y="390" font-family="monospace" font-size="10" fill="#64748b">,</text>
  <text x="980" y="406" font-family="monospace" font-size="10" fill="#7dd3fc">"currency"</text>
  <text x="1050" y="406" font-family="monospace" font-size="10" fill="#64748b">:</text>
  <text x="1060" y="406" font-family="monospace" font-size="10" fill="#fcd34d">"USD"</text>
