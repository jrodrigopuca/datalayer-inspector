  <rect x="1240" y="163" width="50" height="16" rx="8" fill="#3B82F6" opacity="0.2"/>
  <text x="1265" y="175" font-family="system-ui" font-size="9" fill="#3B82F6" text-anchor="middle">GTM</text>
  
  <rect x="935" y="195" width="370" height="32" rx="4" fill="#1e293b"/>
  <rect x="943" y="203" width="4" height="16" rx="2" fill="#f59e0b"/>
