<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#grid)"/>
  
  <!-- Logo -->
  <rect x="180" y="180" width="200" height="200" rx="32" fill="#3B82F6"/>
  <text x="280" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle">S</text>
  
  <!-- Text content -->
  <text x="440" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">Strata</text>
  <text x="440" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">The Developer's DataLayer Inspector</text>
  
  <!-- Feature pills -->
  <rect x="440" y="360" width="120" height="36" rx="18" fill="#3B82F6" opacity="0.2"/>
  <text x="500" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3B82F6" text-anchor="middle" font-weight="600">Inspect</text>
  
  <rect x="580" y="360" width="120" height="36" rx="18" fill="#22c55e" opacity="0.2"/>
  <text x="640" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="600">Validate</text>
  
  <rect x="720" y="360" width="120" height="36" rx="18" fill="#f59e0b" opacity="0.2"/>
  <text x="780" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="600">Export</text>
  
  <!-- Mock UI preview on the right -->
  <rect x="920" y="100" width="400" height="360" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  
  <!-- Mock toolbar -->
  <rect x="920" y="100" width="400" height="40" rx="12" fill="#1e293b"/>
  <rect x="920" y="128" width="400" height="12" fill="#1e293b"/>
  <circle cx="945" cy="120" r="6" fill="#ef4444"/>
  <circle cx="965" cy="120" r="6" fill="#f59e0b"/>
  <circle cx="985" cy="120" r="6" fill="#22c55e"/>
