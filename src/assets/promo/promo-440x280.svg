      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg)"/>
  
  <!-- Logo -->
  <rect x="60" y="90" width="100" height="100" rx="16" fill="#3B82F6"/>
  <text x="110" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="55" font-weight="bold" fill="white" text-anchor="middle">S</text>
  
  <!-- Text -->
